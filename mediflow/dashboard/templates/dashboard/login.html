<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hospital Ops — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0a0c14;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(0,212,255,0.05) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,204,102,0.05) 0%,transparent 60%);pointer-events:none;}
.login-box{background:#1a1d2e;border-radius:16px;padding:40px;width:100%;max-width:400px;border:1px solid #252840;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.logo{text-align:center;margin-bottom:32px;}
.logo h1{color:#00d4ff;font-size:26px;letter-spacing:2px;}
.logo p{color:#aaa;font-size:13px;margin-top:6px;}
.logo .cross{font-size:40px;margin-bottom:10px;}
.form-group{margin-bottom:20px;}
.form-group label{display:block;color:#aaa;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.form-group input{width:100%;background:#0a0c14;border:1px solid #333;color:#fff;padding:12px 16px;border-radius:8px;font-size:14px;outline:none;transition:border-color 0.2s;}
.form-group input:focus{border-color:#00d4ff;}
.btn{width:100%;background:linear-gradient(135deg,#00d4ff,#0099bb);color:#000;border:none;padding:14px;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:opacity 0.2s;}
.btn:hover{opacity:0.9;}
.error{background:rgba(255,68,68,0.15);border:1px solid #ff4444;color:#ff4444;padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:20px;text-align:center;}
.footer{text-align:center;margin-top:24px;color:#555;font-size:12px;}
.divider{display:flex;align-items:center;gap:10px;margin:20px 0;}
.divider hr{flex:1;border:none;border-top:1px solid #252840;}
.divider span{color:#555;font-size:12px;}
.role-hints{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.role-hint{background:#0a0c14;border:1px solid #252840;border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:border-color 0.2s;}
.role-hint:hover{border-color:#00d4ff;}
.role-hint .icon{font-size:20px;margin-bottom:4px;}
.role-hint .name{font-size:12px;color:#aaa;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="login-box">
  <div class="logo">
    <div class="cross">🏥</div>
    <h1>HOSPITAL OPS</h1>
    <p>Real-time Hospital Intelligence Platform Dashboard</p>
  </div>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <div class="divider"><hr><span>LOGIN TO CONTINUE</span><hr></div>
  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" autofocus/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password"/>
    </div>
    <button type="submit" class="btn">LOGIN →</button>
  </form>
  <div class="footer">Powered by Django + Groq AI • Built for SOPEONOW Interview</div>
</div>
</body>
</html>
